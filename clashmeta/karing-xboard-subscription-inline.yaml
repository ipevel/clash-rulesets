mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
external-controller: 127.0.0.1:9090
clash-for-android:
  append-system-dns: false
unified-delay: true
global-client-fingerprint: chrome
keep-alive-interval: 360
proxies: null
proxy-groups:
- name: 🚀 节点选择
  type: select
  proxies:
  - 🔯 故障转移
- name: 🔯 故障转移
  type: fallback
  url: http://www.gstatic.com/generate_204
  interval: 180
  proxies: []
- name: 🎯 全球直连
  type: select
  proxies:
  - DIRECT
  - 🚀 节点选择
- name: 🛑 全球拦截
  type: select
  proxies:
  - REJECT
  - DIRECT
- name: 🐟 漏网之鱼
  type: select
  proxies:
  - 🚀 节点选择
  - 🎯 全球直连
  - 🔯 故障转移
- name: 💬 Ai平台
  type: select
  proxies:
  - 🚀 节点选择
  - 🎯 全球直连

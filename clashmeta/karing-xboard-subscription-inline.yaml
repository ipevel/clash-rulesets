  - 🎯 全球直连
- name: 🔍 Google
  type: select
  proxies:
  - 🚀 节点选择
  - 🎯 全球直连
- name: ▶️ Google Play
  type: select
  proxies:
  - 🚀 节点选择
  - 🎯 全球直连
- name: 🔔 Google FCM
  type: select
  proxies:
  - 🚀 节点选择
